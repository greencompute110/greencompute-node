services:
  node-agent:
    image: python:3.12-slim
    working_dir: /app/node
    volumes:
      - ./:/app/node
      - ${PROTOCOL_DIR:-../../greenference/protocol}:/app/protocol
      - /var/run/docker.sock:/var/run/docker.sock
      - ${BITTENSOR_WALLET_DIR:-~/.bittensor}:/root/.bittensor:ro
      - node-volumes:/tmp/greenference-node-volumes
      - node-artifacts:/tmp/greenference-node-artifacts
      - ${HF_HOME:-~/.cache/huggingface}:/root/.cache/huggingface
    environment:
      GREENFERENCE_ENABLE_BACKGROUND_WORKERS: "true"
      GREENFERENCE_WORKER_POLL_INTERVAL_SECONDS: "${WORKER_POLL_INTERVAL_SECONDS:-1.0}"
      GREENFERENCE_BOOTSTRAP_MINER: "true"
      GREENFERENCE_CONTROL_PLANE_URL: "${GREENFERENCE_CONTROL_PLANE_URL}"
      GREENFERENCE_MINER_HOTKEY: "${GREENFERENCE_MINER_HOTKEY}"
      GREENFERENCE_MINER_PAYOUT_ADDRESS: "${GREENFERENCE_MINER_PAYOUT_ADDRESS:-}"
      GREENFERENCE_MINER_AUTH_SECRET: "${GREENFERENCE_MINER_AUTH_SECRET:-greenference-node-local-secret}"
      GREENFERENCE_MINER_API_BASE_URL: "${GREENFERENCE_MINER_API_BASE_URL:-http://127.0.0.1:8007}"
      GREENFERENCE_MINER_VALIDATOR_URL: "${GREENFERENCE_MINER_VALIDATOR_URL}"
      GREENFERENCE_MINER_NODE_ID: "${GREENFERENCE_MINER_NODE_ID:-node-01}"
      # Hardware
      GREENFERENCE_GPU_MODEL: "${GREENFERENCE_GPU_MODEL:-rtx4090}"
      GREENFERENCE_GPU_COUNT: "${GREENFERENCE_GPU_COUNT:-1}"
      GREENFERENCE_VRAM_GB_PER_GPU: "${GREENFERENCE_VRAM_GB_PER_GPU:-24}"
      GREENFERENCE_CPU_CORES: "${GREENFERENCE_CPU_CORES:-32}"
      GREENFERENCE_MEMORY_GB: "${GREENFERENCE_MEMORY_GB:-128}"
      GREENFERENCE_PERFORMANCE_SCORE: "${GREENFERENCE_PERFORMANCE_SCORE:-1.0}"
      GREENFERENCE_GPU_SPLIT_UNITS: "${GREENFERENCE_GPU_SPLIT_UNITS:-100}"
      # Auth
      GREENFERENCE_AUTH_MODE: "${GREENFERENCE_AUTH_MODE:-hmac}"
      GREENFERENCE_COLDKEY_NAME: "${GREENFERENCE_COLDKEY_NAME:-}"
      GREENFERENCE_HOTKEY_NAME: "${GREENFERENCE_HOTKEY_NAME:-default}"
      # Backends
      GREENFERENCE_POD_BACKEND: "${GREENFERENCE_POD_BACKEND:-process}"
      GREENFERENCE_VM_BACKEND: "${GREENFERENCE_VM_BACKEND:-stub}"
      GREENFERENCE_INFERENCE_BACKEND: "${GREENFERENCE_INFERENCE_BACKEND:-docker}"
      # HuggingFace (for vLLM model downloads)
      HF_TOKEN: "${HF_TOKEN:-}"
      HF_HOME: /root/.cache/huggingface
      # Security
      GREENFERENCE_SECURITY_TIER: "${GREENFERENCE_SECURITY_TIER:-standard}"
      GREENFERENCE_ATTESTATION_ENABLED: "${GREENFERENCE_ATTESTATION_ENABLED:-false}"
      # Workload kinds
      GREENFERENCE_SUPPORTED_WORKLOAD_KINDS: "${GREENFERENCE_SUPPORTED_WORKLOAD_KINDS:-inference,pod,vm}"
      # SSH
      GREENFERENCE_SSH_HOST: "${GREENFERENCE_SSH_HOST:-0.0.0.0}"
      GREENFERENCE_SSH_PORT_RANGE_START: "${GREENFERENCE_SSH_PORT_RANGE_START:-30000}"
      GREENFERENCE_SSH_PORT_RANGE_END: "${GREENFERENCE_SSH_PORT_RANGE_END:-31000}"
      # Persistence
      GREENFERENCE_RUNTIME_STATE_PATH: /tmp/greenference-node-runtime-state.json
      GREENFERENCE_VOLUME_BASE_DIR: /tmp/greenference-node-volumes
      GREENFERENCE_ARTIFACT_CACHE_DIR: /tmp/greenference-node-artifacts
      # PYTHONPATH
      PYTHONPATH: /app/protocol/src:/app/node/services/node-agent/src
    command: >
      sh -lc "apt-get update -qq && apt-get install -y -qq docker.io openssh-client >/dev/null 2>&1;
      pip install -q fastapi uvicorn pydantic substrate-interface &&
      uvicorn greenference_node_agent.main:app --host 0.0.0.0 --port 8007"
    ports:
      - "8007:8007"
      - "30000-31000:30000-31000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"from urllib.request import urlopen; urlopen('http://127.0.0.1:8007/readyz')\""]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  node-volumes:
  node-artifacts:
